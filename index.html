<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIF на весь экран</title>
  <style>
    /* Убираем отступы и скролл */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    /* Делаем ссылку на всю страницу */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: black; /* на случай, если гифка меньше экрана */
    }

    a {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Гифка растягивается по экрану, сохраняя пропорции */
    img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* масштабирует и обрезает, чтобы заполнить экран */
      display: block;
    }
  </style>
</head>
<body>
  <a href="https://music.apple.com/ru/album/exit-music-for-a-film/1097861387?i=1097861833" target="_blank">
    <img src="mishkina1.gif" alt="GIF">
  </a>
</body>
</html>
